name: CI

on:
  push:
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: |
          export DATABASE_URL=sqlite:////tmp/heyu-migration.db
          alembic upgrade head
          alembic check
          alembic downgrade base
          alembic upgrade head
      - run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80

  windows-package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - name: Install with the user-facing script
        shell: powershell
        run: |
          $env:HEYU_PYTHON = (Get-Command python).Source
          ./scripts/setup-windows.ps1
      - name: Start and verify the packaged workspace
        shell: powershell
        run: |
          ./scripts/start-windows.ps1 -Port 8765 -OpenBrowser:$false
          $health = Invoke-RestMethod http://127.0.0.1:8765/health
          if ($health.status -ne "ok") {
            throw "Unexpected health response."
          }
          $workspacePath = Join-Path $env:RUNNER_TEMP "heyu-workspace.html"
          & curl.exe --fail --silent --show-error --output $workspacePath http://127.0.0.1:8765/
          $curlExitCode = $LASTEXITCODE
          $workspace = Get-Content -LiteralPath $workspacePath -Raw -Encoding UTF8
          if ($curlExitCode -ne 0 -or $workspace -notmatch 'id="bootstrap-form"') {
            throw "Workspace did not load from the Windows package."
          }
      - name: Upload Windows source package
        shell: powershell
        run: |
          $exclude = @(".git", ".venv", "data", "outputs", "work", ".pytest_cache", ".ruff_cache")
          Get-ChildItem -Force |
            Where-Object { $_.Name -notin $exclude } |
            Compress-Archive -DestinationPath heyu-ai-windows-source.zip
      - uses: actions/upload-artifact@v4
        with:
          name: heyu-ai-windows-source
          path: heyu-ai-windows-source.zip
          if-no-files-found: error

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose configuration
        run: docker compose config --quiet
      - name: Build application image
        run: docker compose build api
      - name: Start PostgreSQL stack
        run: docker compose up -d --wait
      - name: Verify PostgreSQL-backed workflow and persistence
        shell: bash
        run: |
          set -euo pipefail
          timeout 90 bash -c 'until curl --fail --silent http://127.0.0.1:8000/health >/dev/null; do sleep 2; done'
          health=$(curl --fail --silent --show-error http://127.0.0.1:8000/health)
          test "$(jq -r .status <<<"$health")" = "ok"

          token=$(curl --fail --silent --show-error \
            -H 'Content-Type: application/json' \
            -d '{"organization_name":"Docker Farm","organization_slug":"docker-farm","email":"owner@docker.example","display_name":"Docker Owner","password":"correct-horse-battery"}' \
            http://127.0.0.1:8000/v1/auth/bootstrap | jq -r .access_token)
          test -n "$token" && test "$token" != "null"

          brand_id=$(curl --fail --silent --show-error \
            -H "Authorization: Bearer $token" \
            -H 'Content-Type: application/json' \
            -d '{"name":"Docker Demo Farm","story":"PostgreSQL persistence check","voice":"trustworthy"}' \
            http://127.0.0.1:8000/v1/brands | jq -r .id)
          test -n "$brand_id" && test "$brand_id" != "null"

          docker compose restart api
          timeout 60 bash -c 'until curl --fail --silent http://127.0.0.1:8000/health >/dev/null; do sleep 2; done'

          login_token=$(curl --fail --silent --show-error \
            -H 'Content-Type: application/json' \
            -d '{"organization_slug":"docker-farm","email":"owner@docker.example","password":"correct-horse-battery"}' \
            http://127.0.0.1:8000/v1/auth/login | jq -r .access_token)
          brands=$(curl --fail --silent --show-error \
            -H "Authorization: Bearer $login_token" \
            http://127.0.0.1:8000/v1/brands)
          test "$(jq -r 'length' <<<"$brands")" = "1"
          test "$(jq -r '.[0].id' <<<"$brands")" = "$brand_id"
      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Stop PostgreSQL stack
        if: always()
        run: docker compose down -v
