name: CI

on:
  push:
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: |
          export DATABASE_URL=sqlite:////tmp/heyu-migration.db
          alembic upgrade head
          alembic check
          alembic downgrade base
          alembic upgrade head
      - run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80

  repository-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install repository validation dependencies
        run: python -m pip install PyYAML==6.0.3
      - name: Self-test repository audit rules
        run: python scripts/test-audit-repository.py
      - name: Audit tracked files and obvious secrets
        run: python scripts/audit-repository.py
      - name: Validate Render demo blueprint
        run: python scripts/test-render-blueprint.py
      - name: Test demo account setup workflow
        run: python scripts/test-setup-demo-accounts.py
      - name: Test synthetic demo workspace seed
        run: python scripts/test-seed-demo-workspace.py
      - name: Test interactive Render demo initializer
        run: python scripts/test-initialize-render-demo.py
      - name: Test exact-commit release evidence
        run: python scripts/test-release-evidence.py
      - name: Test browser content renderer
        run: node scripts/test-content-renderer.js
      - name: Test trilingual dictionaries
        run: node scripts/test-i18n.js

  browser-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - name: Install API and browser test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "apps/api[dev]"
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps chromium
      - name: Migrate browser E2E database
        working-directory: apps/api
        env:
          DATABASE_URL: sqlite:////tmp/heyu-browser-e2e.db
        run: alembic upgrade head
      - name: Start SQLite API
        shell: bash
        run: |
          set -euo pipefail
          export DATABASE_URL=sqlite:////tmp/heyu-browser-e2e.db
          nohup python -m uvicorn e2e_app:app \
            --app-dir apps/api \
            --host 127.0.0.1 \
            --port 8765 \
            > "$RUNNER_TEMP/heyu-browser-e2e-api.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/heyu-browser-e2e-api.pid"
          timeout 60 bash -c 'until curl --fail --silent http://127.0.0.1:8765/health >/dev/null; do sleep 1; done'
      - name: Run trilingual browser and invitation E2E
        env:
          HEYU_BASE_URL: http://127.0.0.1:8765
          HEYU_E2E_OUTPUT: outputs/browser-e2e
        run: pnpm test:e2e
      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: heyu-browser-e2e
          path: |
            outputs/browser-e2e
            ${{ runner.temp }}/heyu-browser-e2e-api.log
          if-no-files-found: error

  windows-package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - name: Install with the user-facing script
        shell: powershell
        run: |
          $env:HEYU_PYTHON = (Get-Command python).Source
          ./scripts/setup-windows.ps1
      - name: Start and verify the packaged workspace
        shell: powershell
        run: |
          ./scripts/start-windows.ps1 -Port 8765 -OpenBrowser:$false
          $health = Invoke-RestMethod http://127.0.0.1:8765/health
          if ($health.status -ne "ok") {
            throw "Unexpected health response."
          }
          $workspacePath = Join-Path $env:RUNNER_TEMP "heyu-workspace.html"
          & curl.exe --fail --silent --show-error --output $workspacePath http://127.0.0.1:8765/workspace/
          $curlExitCode = $LASTEXITCODE
          $workspace = Get-Content -LiteralPath $workspacePath -Raw -Encoding UTF8
          if ($curlExitCode -ne 0 -or $workspace -notmatch 'id="bootstrap-form"') {
            throw "Workspace did not load from the Windows package."
          }
          $landingPath = Join-Path $env:RUNNER_TEMP "heyu-landing.html"
          & curl.exe --fail --silent --show-error --output $landingPath http://127.0.0.1:8765/
          if ($LASTEXITCODE -ne 0) {
            throw "Landing page did not load from the Windows package."
          }
          $landing = Get-Content -LiteralPath $landingPath -Raw -Encoding UTF8
          if ($landing -notmatch 'hero-field-fallback.svg') {
            throw "Landing page does not declare the distributable hero fallback."
          }
          & curl.exe --fail --silent --show-error `
            --output (Join-Path $env:RUNNER_TEMP "hero-field-fallback.svg") `
            http://127.0.0.1:8765/assets/hero-field-fallback.svg
          if ($LASTEXITCODE -ne 0) {
            throw "Distributable hero fallback is missing from the Windows package."
          }
      - name: Run deployment-level MVP acceptance smoke
        shell: powershell
        run: |
          python scripts/acceptance-smoke.py `
            --base-url http://127.0.0.1:8765 `
            --output "$env:RUNNER_TEMP\heyu-windows-acceptance.json"
      - name: Upload Windows acceptance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: heyu-windows-acceptance
          path: ${{ runner.temp }}/heyu-windows-acceptance.json
          if-no-files-found: error
      - name: Build standalone Windows portable package
        shell: powershell
        run: |
          ./scripts/build-windows-portable.ps1 `
            -Python (Resolve-Path ".venv\Scripts\python.exe").Path `
            -OutputDirectory "$env:RUNNER_TEMP\heyu-portable"
      - name: Start and verify standalone Windows portable package
        shell: powershell
        run: |
          $portableRoot = "$env:RUNNER_TEMP\heyu-portable\heyu-ai-windows-portable"
          $executable = Join-Path $portableRoot "HeyuAI.exe"
          $process = Start-Process -FilePath $executable `
            -ArgumentList @("--port", "8766", "--no-browser") `
            -WorkingDirectory $portableRoot `
            -WindowStyle Hidden `
            -PassThru
          try {
            for ($attempt = 0; $attempt -lt 120; $attempt++) {
              Start-Sleep -Milliseconds 500
              if ($process.HasExited) {
                throw "Portable launcher exited with code $($process.ExitCode)."
              }
              try {
                $health = Invoke-RestMethod http://127.0.0.1:8766/health -TimeoutSec 1
                if ($health.status -eq "ok") {
                  break
                }
              } catch {
                # Continue until the startup deadline.
              }
            }
            if (-not $health -or $health.status -ne "ok") {
              throw "Portable launcher did not become healthy."
            }
            python scripts/acceptance-smoke.py `
              --base-url http://127.0.0.1:8766 `
              --output "$env:RUNNER_TEMP\heyu-portable-acceptance.json"
            if (-not (Test-Path -LiteralPath (Join-Path $portableRoot "data\heyu.db"))) {
              throw "Portable launcher did not create its local database."
            }
          } finally {
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
          }
      - name: Upload standalone Windows portable package
        uses: actions/upload-artifact@v4
        with:
          name: heyu-ai-windows-portable
          path: ${{ runner.temp }}/heyu-portable/heyu-ai-windows-portable.zip
          if-no-files-found: error
      - name: Upload Windows source package
        shell: powershell
        run: |
          $exclude = @(".git", ".venv", "data", "outputs", "work", ".pytest_cache", ".ruff_cache")
          Get-ChildItem -Force |
            Where-Object { $_.Name -notin $exclude } |
            Compress-Archive -DestinationPath heyu-ai-windows-source.zip
      - uses: actions/upload-artifact@v4
        with:
          name: heyu-ai-windows-source
          path: heyu-ai-windows-source.zip
          if-no-files-found: error

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose configuration
        run: docker compose config --quiet
      - name: Build application image
        run: docker compose build api
      - name: Start PostgreSQL stack
        run: docker compose up -d --wait
      - name: Verify PostgreSQL-backed workflow and persistence
        shell: bash
        run: |
          set -euo pipefail
          timeout 90 bash -c 'until curl --fail --silent http://127.0.0.1:8000/health >/dev/null; do sleep 2; done'
          health=$(curl --fail --silent --show-error http://127.0.0.1:8000/health)
          test "$(jq -r .status <<<"$health")" = "ok"

          token=$(curl --fail --silent --show-error \
            -H 'Content-Type: application/json' \
            -d '{"organization_name":"Docker Farm","organization_slug":"docker-farm","email":"owner@docker.example","display_name":"Docker Owner","password":"correct-horse-battery"}' \
            http://127.0.0.1:8000/v1/auth/bootstrap | jq -r .access_token)
          test -n "$token" && test "$token" != "null"

          brand_id=$(curl --fail --silent --show-error \
            -H "Authorization: Bearer $token" \
            -H 'Content-Type: application/json' \
            -d '{"name":"Docker Demo Farm","story":"PostgreSQL persistence check","voice":"trustworthy"}' \
            http://127.0.0.1:8000/v1/brands | jq -r .id)
          test -n "$brand_id" && test "$brand_id" != "null"

          invitation=$(curl --fail --silent --show-error \
            -H "Authorization: Bearer $token" \
            -H 'Content-Type: application/json' \
            -d '{"email":"docker-invitee@example.com","role":"creator","expires_in_hours":24}' \
            http://127.0.0.1:8000/v1/invitations)
          invitation_token=$(jq -r .token <<<"$invitation")
          test -n "$invitation_token" && test "$invitation_token" != "null"

          revoked_invitation=$(curl --fail --silent --show-error \
            -H "Authorization: Bearer $token" \
            -H 'Content-Type: application/json' \
            -d '{"email":"docker-revoked@example.com","role":"viewer","expires_in_hours":24}' \
            http://127.0.0.1:8000/v1/invitations)
          revoked_invitation_id=$(jq -r .id <<<"$revoked_invitation")
          revoked_invitation_token=$(jq -r .token <<<"$revoked_invitation")
          invitations=$(curl --fail --silent --show-error \
            -H "Authorization: Bearer $token" \
            http://127.0.0.1:8000/v1/invitations)
          test "$(jq --arg id "$revoked_invitation_id" \
            '[.[] | select(.id == $id and .revoked_at == null)] | length' <<<"$invitations")" = "1"
          test "$(jq '[.[] | has("token")] | any' <<<"$invitations")" = "false"

          revoked=$(curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Bearer $token" \
            http://127.0.0.1:8000/v1/invitations/"$revoked_invitation_id"/revoke)
          test "$(jq -r .id <<<"$revoked")" = "$revoked_invitation_id"
          test "$(jq -r .revoked_at <<<"$revoked")" != "null"
          revoked_accept_status=$(curl --silent --output /dev/null --write-out '%{http_code}' \
            -H 'Content-Type: application/json' \
            -d "$(jq -nc --arg token "$revoked_invitation_token" \
              '{token:$token,display_name:"Revoked Invitee",password:"correct-horse-battery-revoked"}')" \
            http://127.0.0.1:8000/v1/invitations/accept)
          test "$revoked_accept_status" = "410"
          replacement_status=$(curl --silent --output /dev/null --write-out '%{http_code}' \
            -H "Authorization: Bearer $token" \
            -H 'Content-Type: application/json' \
            -d '{"email":"docker-revoked@example.com","role":"viewer","expires_in_hours":24}' \
            http://127.0.0.1:8000/v1/invitations)
          test "$replacement_status" = "201"

          invitee_token=$(curl --fail --silent --show-error \
            -H 'Content-Type: application/json' \
            -d "$(jq -nc --arg token "$invitation_token" \
              '{token:$token,display_name:"Docker Invitee",password:"correct-horse-battery-invitee"}')" \
            http://127.0.0.1:8000/v1/invitations/accept | jq -r .access_token)
          test -n "$invitee_token" && test "$invitee_token" != "null"

          docker compose restart api
          timeout 60 bash -c 'until curl --fail --silent http://127.0.0.1:8000/health >/dev/null; do sleep 2; done'

          login_token=$(curl --fail --silent --show-error \
            -H 'Content-Type: application/json' \
            -d '{"organization_slug":"docker-farm","email":"owner@docker.example","password":"correct-horse-battery"}' \
            http://127.0.0.1:8000/v1/auth/login | jq -r .access_token)
          # The successful login above consumes one request in the fixed window.
          for attempt in $(seq 1 9); do
            login_status=$(curl --silent --output /dev/null --write-out '%{http_code}' \
              -H 'Content-Type: application/json' \
              -d '{"organization_slug":"docker-farm","email":"owner@docker.example","password":"wrong-password"}' \
              http://127.0.0.1:8000/v1/auth/login)
            test "$login_status" = "401"
          done
          limiter_headers="$RUNNER_TEMP/heyu-rate-limit-headers"
          limited_status=$(curl --silent --dump-header "$limiter_headers" \
            --output /dev/null --write-out '%{http_code}' \
            -H 'Content-Type: application/json' \
            -d '{"organization_slug":"docker-farm","email":"owner@docker.example","password":"correct-horse-battery"}' \
            http://127.0.0.1:8000/v1/auth/login)
          test "$limited_status" = "429"
          grep -qi '^retry-after: [1-9][0-9]*' "$limiter_headers"
          grep -qi '^cache-control: no-store' "$limiter_headers"
          limiter_storage=$(docker compose exec -T db psql -U agri -d agri -Atc \
            "select count(*) from abuse_limit_buckets where length(subject_hash) = 64")
          test "$limiter_storage" -gt 0
          raw_subjects=$(docker compose exec -T db psql -U agri -d agri -Atc \
            "select count(*) from abuse_limit_buckets where subject_hash like '%owner@docker.example%' or subject_hash like '%127.0.0.1%'")
          test "$raw_subjects" = "0"

          docker compose restart api
          timeout 60 bash -c 'until curl --fail --silent http://127.0.0.1:8000/health >/dev/null; do sleep 2; done'
          persisted_limit_status=$(curl --silent --output /dev/null --write-out '%{http_code}' \
            -H 'Content-Type: application/json' \
            -d '{"organization_slug":"docker-farm","email":"owner@docker.example","password":"correct-horse-battery"}' \
            http://127.0.0.1:8000/v1/auth/login)
          test "$persisted_limit_status" = "429"
          docker compose exec -T db psql -U agri -d agri -c \
            "delete from abuse_limit_buckets" >/dev/null

          brands=$(curl --fail --silent --show-error \
            -H "Authorization: Bearer $login_token" \
            http://127.0.0.1:8000/v1/brands)
          test "$(jq -r 'length' <<<"$brands")" = "1"
          test "$(jq -r '.[0].id' <<<"$brands")" = "$brand_id"
          echo "$brand_id" > "$RUNNER_TEMP/heyu-brand-id"
      - name: Run deployment-level MVP acceptance smoke
        run: |
          python scripts/acceptance-smoke.py \
            --base-url http://127.0.0.1:8000 \
            --output "$RUNNER_TEMP/heyu-docker-acceptance.json"
      - name: Upload Docker acceptance report
        uses: actions/upload-artifact@v4
        with:
          name: heyu-docker-acceptance
          path: ${{ runner.temp }}/heyu-docker-acceptance.json
          if-no-files-found: error
      - name: Back up and restore PostgreSQL into a fresh volume
        shell: bash
        run: |
          set -euo pipefail
          backup="$RUNNER_TEMP/heyu-postgresql.backup"
          brand_id=$(cat "$RUNNER_TEMP/heyu-brand-id")

          docker compose exec -T db pg_dump -U agri -d agri -Fc > "$backup"
          test -s "$backup"

          docker compose down -v
          docker compose up -d --wait db
          docker compose exec -T db pg_restore \
            -U agri -d agri --clean --if-exists --no-owner --no-privileges \
            < "$backup"
          docker compose up -d --wait api
          timeout 90 bash -c 'until curl --fail --silent http://127.0.0.1:8000/health >/dev/null; do sleep 2; done'

          login_token=$(curl --fail --silent --show-error \
            -H 'Content-Type: application/json' \
            -d '{"organization_slug":"docker-farm","email":"owner@docker.example","password":"correct-horse-battery"}' \
            http://127.0.0.1:8000/v1/auth/login | jq -r .access_token)
          test -n "$login_token" && test "$login_token" != "null"

          brands=$(curl --fail --silent --show-error \
            -H "Authorization: Bearer $login_token" \
            http://127.0.0.1:8000/v1/brands)
          test "$(jq -r 'length' <<<"$brands")" = "1"
          test "$(jq -r '.[0].id' <<<"$brands")" = "$brand_id"
          test "$(jq -r '.[0].name' <<<"$brands")" = "Docker Demo Farm"

          invitee_token=$(curl --fail --silent --show-error \
            -H 'Content-Type: application/json' \
            -d '{"organization_slug":"docker-farm","email":"docker-invitee@example.com","password":"correct-horse-battery-invitee"}' \
            http://127.0.0.1:8000/v1/auth/login | jq -r .access_token)
          test -n "$invitee_token" && test "$invitee_token" != "null"
      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Stop PostgreSQL stack
        if: always()
        run: docker compose down -v
