name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-portable:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - name: Install application
        run: |
          python -m pip install --upgrade pip
          pip install apps/api
      - name: Build standalone Windows portable package
        shell: powershell
        run: |
          ./scripts/build-windows-portable.ps1 `
            -Python (Get-Command python).Source `
            -OutputDirectory "$env:RUNNER_TEMP\heyu-portable"
      - name: Verify standalone package
        shell: powershell
        run: |
          $portableRoot = "$env:RUNNER_TEMP\heyu-portable\heyu-ai-windows-portable"
          $executable = Join-Path $portableRoot "HeyuAI.exe"
          $process = Start-Process -FilePath $executable `
            -ArgumentList @("--port", "8766", "--no-browser") `
            -WorkingDirectory $portableRoot `
            -WindowStyle Hidden `
            -PassThru
          try {
            $healthy = $false
            for ($attempt = 0; $attempt -lt 120; $attempt++) {
              Start-Sleep -Milliseconds 500
              if ($process.HasExited) {
                throw "Portable launcher exited with code $($process.ExitCode)."
              }
              try {
                $health = Invoke-RestMethod http://127.0.0.1:8766/health -TimeoutSec 1
                if ($health.status -eq "ok") {
                  $healthy = $true
                  break
                }
              } catch {
                # Continue until the startup deadline.
              }
            }
            if (-not $healthy) {
              throw "Portable launcher did not become healthy."
            }
            python scripts/acceptance-smoke.py `
              --base-url http://127.0.0.1:8766 `
              --output "$env:RUNNER_TEMP\heyu-portable-acceptance.json"
          } finally {
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
          }
      - name: Publish GitHub release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "$env:RUNNER_TEMP\heyu-portable\heyu-ai-windows-portable.zip" `
            --title "禾语 AI ${{ github.ref_name }}" `
            --generate-notes `
            --verify-tag
