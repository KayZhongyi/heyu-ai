services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: agri
      POSTGRES_PASSWORD: agri
      POSTGRES_DB: agri
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agri"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_SECRET: ${APP_SECRET:-local-development-secret}
      AUTO_CREATE_SCHEMA: "false"
      DATABASE_URL: postgresql+psycopg://agri:agri@db:5432/agri
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      AI_MODEL: ${AI_MODEL:-deterministic-v1}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready')",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
