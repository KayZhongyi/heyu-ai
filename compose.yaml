services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: agri
      POSTGRES_PASSWORD: agri
      POSTGRES_DB: agri
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agri"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
    environment:
      APP_ENV: development
      APP_SECRET: ${APP_SECRET:-local-development-secret}
      DATABASE_URL: postgresql+psycopg://agri:agri@db:5432/agri
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      AI_MODEL: ${AI_MODEL:-deterministic-v1}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:

